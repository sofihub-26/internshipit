<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estimate Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="estimates">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">IMS System</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="clients.html">Clients</a></li>
                <li class="nav-item"><a class="nav-link active" href="estimates.html">Estimates</a></li>
                <li class="nav-item"><a class="nav-link" href="invoices.html">Invoices</a></li>
                <li class="nav-item"><a class="nav-link" href="payments.html">Payments</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">Estimate Management</h2>

    <!-- Estimate Form -->
    <div class="card shadow mb-4">
        <div class="card-header bg-primary text-white">
            Create Estimate
        </div>

        <div class="card-body">

            <form id="estimateForm">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Estimate No</label>
                        <input id="estimateNo" type="text" class="form-control" value="EST001" readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Estimate Date</label>
                        <input id="estimateDate" type="date" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Client Name</label>
                        <select id="estimateClient" class="form-select">
                            <option>Select Client</option>
                            <option>ABC Pvt Ltd</option>
                            <option>XYZ Traders</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Amount (₹)</label>
                        <input id="estimateAmount" type="number" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">GST (%)</label>
                        <select id="estimateGst" class="form-select">
                            <option value="18">18%</option>
                            <option value="12">12%</option>
                            <option value="5">5%</option>
                            <option value="0">0%</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Total Amount (₹)</label>
                        <input id="estimateTotal" type="number" class="form-control" readonly>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Status</label>
                        <select id="estimateStatus" class="form-select">
                            <option value="Pending">Pending</option>
                            <option value="Approved">Approved</option>
                            <option value="Rejected">Rejected</option>
                        </select>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Remarks</label>
                        <textarea id="estimateRemarks" class="form-control" rows="3"></textarea>
                    </div>

                </div>

                <button class="btn btn-primary">Save Estimate</button>
                <button type="reset" class="btn btn-secondary">Clear</button>

            </form>

        </div>
    </div>

    <!-- Estimate List -->

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            Estimate List
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover text-center">

                <thead class="table-light">
                <tr>
                    <th>No</th>
                    <th>Client</th>
                    <th>Date</th>
                    <th>Amount</th>
                    <th>GST</th>
                    <th>Total</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
                </thead>

                <tbody id="estimateTableBody">
                <tr>
                    <td>EST001</td>
                    <td>ABC Pvt Ltd</td>
                    <td>30-06-2026</td>
                    <td>₹10,000</td>
                    <td>18%</td>
                    <td>₹11,800</td>
                    <td><span class="badge bg-warning text-dark">Pending</span></td>
                    <td>
                        <button class="btn btn-warning btn-sm">Edit</button>
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </td>
                </tr>

                <tr>
                    <td>EST002</td>
                    <td>XYZ Traders</td>
                    <td>01-07-2026</td>
                    <td>₹8,000</td>
                    <td>18%</td>
                    <td>₹9,440</td>
                    <td><span class="badge bg-success">Approved</span></td>
                    <td>
                        <button class="btn btn-warning btn-sm">Edit</button>
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
