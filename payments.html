<div class="container mt-4">

    <h2 class="text-center mb-4">Payment Management</h2>

    <!-- Payment Form -->
    <div class="card shadow mb-4">

        <div class="card-header bg-primary text-white">
            Record Payment
        </div>

        <div class="card-body">

            <form id="paymentForm">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Invoice Number</label>
                        <select id="paymentInvoice" class="form-select"></select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Payment Date</label>
                        <input id="paymentDate" type="date" class="form-control">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Amount (₹)</label>
                        <input id="paymentAmount" type="number" class="form-control" placeholder="Enter Amount">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Payment Mode</label>
                        <select id="paymentMode" class="form-select">
                            <option>Cash</option>
                            <option>UPI</option>
                            <option>Credit Card</option>
                            <option>Debit Card</option>
                            <option>Bank Transfer</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Payment Status</label>
                        <select id="paymentStatus" class="form-select">
                            <option>Paid</option>
                            <option>Pending</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Remarks</label>
                        <input id="paymentRemarks" type="text" class="form-control" placeholder="Optional Remarks">
                    </div>

                </div>

                <button class="btn btn-success">Save Payment</button>
                <button type="reset" class="btn btn-secondary">Clear</button>

            </form>

        </div>

    </div>

    <!-- Payment List -->
    <div class="card shadow">

        <div class="card-header bg-success text-white">
            Payment History
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover text-center">

                <thead class="table-light">
                    <tr>
                        <th>Payment ID</th>
                        <th>Invoice</th>
                        <th>Date</th>
                        <th>Amount</th>
                        <th>Mode</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="paymentTableBody">

                    <tr>
                        <td>1</td>
                        <td>INV001</td>
                        <td>01-07-2026</td>
                        <td>₹11,800</td>
                        <td>UPI</td>
                        <td>
                            <span class="badge bg-success">Paid</span>
                        </td>
                        <td>
                            <button class="btn btn-warning btn-sm">Edit</button>
                            <button class="btn btn-danger btn-sm">Delete</button>
                        </td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>INV002</td>
                        <td>02-07-2026</td>
                        <td>₹9,440</td>
                        <td>Cash</td>
                        <td>
                            <span class="badge bg-warning text-dark">Pending</span>
                        </td>
                        <td>
                            <button class="btn btn-warning btn-sm">Edit</button>
                            <button class="btn btn-danger btn-sm">Delete</button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>
