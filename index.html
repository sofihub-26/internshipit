<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IMS Dashboard</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body data-page="dashboard">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">IMS System</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="index.html">Dashboard</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="clients.html">Clients</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="estimates.html">Estimates</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="invoices.html">Invoices</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="payments.html">Payments</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Dashboard -->
<div class="container mt-4">

    <h2 class="mb-4 text-center">Dashboard</h2>

    <div class="row">

        <div class="col-md-3 mb-3">
            <div class="card text-white bg-primary shadow">
                <div class="card-body text-center">
                    <h5>Total Clients</h5>
                    <h2 id="totalClients">20</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-white bg-success shadow">
                <div class="card-body text-center">
                    <h5>Estimates</h5>
                    <h2 id="totalEstimates">12</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-white bg-warning shadow">
                <div class="card-body text-center">
                    <h5>Invoices</h5>
                    <h2 id="totalInvoices">8</h2>
                </div>
            </div>
        </div>

        <div class="col-md-3 mb-3">
            <div class="card text-white bg-danger shadow">
                <div class="card-body text-center">
                    <h5>Payments</h5>
                    <h2 id="totalPayments">6</h2>
                </div>
            </div>
        </div>

    </div>

    <!-- Recent Clients -->
    <div class="card shadow mt-4">
        <div class="card-header bg-primary text-white">
            Recent Clients
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover">

                <thead class="table-light">

                    <tr>
                        <th>ID</th>
                        <th>Client Name</th>
                        <th>Group</th>
                        <th>Phone</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <td>1</td>
                        <td>ABC Pvt Ltd</td>
                        <td>Retail</td>
                        <td>9876543210</td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>XYZ Foods</td>
                        <td>FMCG</td>
                        <td>9876543211</td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td>Fresh Mart</td>
                        <td>Retail</td>
                        <td>9876543212</td>
                    </tr>

                </tbody>

            </table>

        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
