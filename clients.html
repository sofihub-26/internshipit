<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body data-page="clients">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">IMS System</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link active" href="clients.html">Clients</a></li>
                <li class="nav-item"><a class="nav-link" href="estimates.html">Estimates</a></li>
                <li class="nav-item"><a class="nav-link" href="invoices.html">Invoices</a></li>
                <li class="nav-item"><a class="nav-link" href="payments.html">Payments</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">Client Management</h2>

    <!-- Client Form -->
    <div class="card shadow mb-4">

        <div class="card-header bg-primary text-white">
            Add Client
        </div>

        <div class="card-body">

            <form id="clientForm">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Client Name</label>
                        <input id="clientName" type="text" class="form-control" placeholder="Enter Client Name">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Email</label>
                        <input id="clientEmail" type="email" class="form-control" placeholder="Enter Email">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Phone</label>
                        <input id="clientPhone" type="text" class="form-control" placeholder="Enter Phone Number">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Group</label>
                        <select id="clientGroup" class="form-select">
                            <option>Select Group</option>
                            <option>Retail</option>
                            <option>FMCG</option>
                            <option>Wholesale</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Chain</label>
                        <input id="clientChain" type="text" class="form-control" placeholder="Enter Chain">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Brand</label>
                        <input id="clientBrand" type="text" class="form-control" placeholder="Enter Brand">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Subzone</label>
                        <input id="clientSubzone" type="text" class="form-control" placeholder="Enter Subzone">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Address</label>
                        <textarea id="clientAddress" class="form-control" rows="2"></textarea>
                    </div>

                </div>

                <button class="btn btn-primary">Save Client</button>
                <button type="reset" class="btn btn-secondary">Clear</button>

            </form>

        </div>

    </div>

    <!-- Client Table -->

    <div class="card shadow">

        <div class="card-header bg-success text-white">
            Client List
        </div>

        <div class="card-body">

            <table class="table table-bordered table-hover text-center">

                <thead class="table-light">

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Group</th>
                    <th>Chain</th>
                    <th>Brand</th>
                    <th>Phone</th>
                    <th>Action</th>
                </tr>

                </thead>

                <tbody id="clientTableBody">
                <tr>
                    <td>1</td>
                    <td>ABC Pvt Ltd</td>
                    <td>Retail</td>
                    <td>Fresh Mart</td>
                    <td>Amul</td>
                    <td>9876543210</td>

                    <td>
                        <button class="btn btn-warning btn-sm">Edit</button>
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </td>

                </tr>

                <tr>
                    <td>2</td>
                    <td>XYZ Traders</td>
                    <td>Wholesale</td>
                    <td>Metro</td>
                    <td>Nestle</td>
                    <td>9123456789</td>

                    <td>
                        <button class="btn btn-warning btn-sm">Edit</button>
                        <button class="btn btn-danger btn-sm">Delete</button>
                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
